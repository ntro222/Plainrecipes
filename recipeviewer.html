<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>PlainRecipes - Recipe Viewer</title>
</head>
<body style="font-family: sans-serif; padding: 20px; line-height: 1.6; color: #1a1a1a;">

    <p style="font-size: 30px; font-weight: bold; margin-bottom: 5px;">Recipe Viewer</p>
    <p style="margin-bottom: 20px;">Original Link: <span id="original-link">None</span></p>
    
    <button id="copypt" style="padding: 10px 15px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 4px; margin-bottom: 20px;">Copy as text</button>
    
    <div id="recipetext" style="font-size: 1.2rem; white-space: pre-wrap; word-wrap: break-word;">Loading recipe...</div>

    <script src="script.js"></script>
</body>
</html>
